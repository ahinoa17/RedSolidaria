{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm mx-auto" style="max-width: 400px;">
    <div class="card-body">
        <h2 class="card-title mb-4">Iniciar sesión</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
