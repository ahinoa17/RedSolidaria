<!DOCTYPE html>
<html>
<head>
    <title>RedSolidaria</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-nav .nav-link,
        .navbar-nav .nav-link i {
          color: #f7f3f3 !important;
          opacity: 1 !important;
          font-weight: 500;
          font-size: 1.15rem;
          transition: color 0.2s;
        }
        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link:focus {
          color: #ffd700 !important; /* Amarillo dorado al pasar el mouse */
        }
        .navbar-nav .btn-outline-light {
          font-weight: 600;
        }
        body {
        min-height: 100vh;
        background: linear-gradient(120deg, #b0cde9 0%, #e0eafc 100%);
        background-attachment: fixed;
        }
       
      </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(90deg, #1a2980 0%, #26d0ce 100%); box-shadow: 0 2px 8px rgba(0,0,0,0.07);">
        <div class="container-fluid">
          <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
            <i class="bi bi-people-fill me-2 fs-3"></i>
            <span class="fw-bold" style="letter-spacing:1px;">RedSolidaria</span>
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav align-items-center gap-2">
              <li class="nav-item">
                <a class="nav-link" href="{% url 'lista_oportunidades' %}"><i class="bi bi-lightbulb"></i> Oportunidades</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'mis_inscripciones' %}"><i class="bi bi-person-check"></i> Mis Inscripciones</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'lista_organizaciones' %}"><i class="bi bi-building"></i> Organizaciones</a>
              </li>
              {% if user.is_superuser %}
              <li class="nav-item">
                <a class="nav-link" href="/admin/"><i class="bi bi-shield-lock"></i> Admin</a>
              </li>
              {% endif %}
              <li class="nav-item">
                <a class="btn btn-outline-light ms-2" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right"></i> Salir</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
